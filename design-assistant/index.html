<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>设计助手 — 公路设计规范</title>
<link rel="stylesheet" href="../css/site.css">
<style>
.da-wrap{max-width:1100px;margin:0 auto}
.da-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.da-tab{padding:9px 20px;border-radius:22px;border:2px solid var(--border);background:var(--card-bg);font-size:13px;cursor:pointer;transition:all .25s;font-weight:500}
.da-tab:hover,.da-tab.active{border-color:var(--accent);color:#fff;background:var(--accent)}
.da-panel{display:none}
.da-panel.active{display:block}
/* 场景 */
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.scene-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--border);padding:20px 22px;transition:all .2s}
.scene-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.scene-card h3{font-size:15px;margin-bottom:6px}
.scene-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.scene-link{font-size:11px;padding:5px 12px;background:var(--accent-light);color:var(--accent);border-radius:14px;text-decoration:none;transition:.2s}
.scene-link:hover{background:var(--accent);color:#fff;text-decoration:none}
.scene-link.key{background:#fef3c7;color:#92400e;font-weight:600}
.scene-tip{font-size:11px;color:#92400e;background:#fef3c7;padding:6px 10px;border-radius:6px;margin:8px 0;line-height:1.5}
/* 项目 */
.pj-form{background:var(--card-bg);border-radius:16px;padding:20px 24px;margin-bottom:20px;border:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;align-items:end}
.pj-form h3{grid-column:1/-1;font-size:16px;margin-bottom:4px}
.pj-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.pj-field input,.pj-field select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none;box-sizing:border-box}
.pj-field input:focus,.pj-field select:focus{border-color:var(--accent)}
.pj-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer}
.pj-btn:hover{background:#1d4ed8}
.pj-btn.del{background:#fff;color:#ef4444;border:2px solid #ef4444}
.pj-card{background:var(--card-bg);border-radius:14px;padding:14px 18px;margin-bottom:10px;border:1px solid var(--border)}
.pj-card .pj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pj-card .pj-name{font-size:15px;font-weight:700}
.pj-card .pj-grade{font-size:10px;padding:3px 10px;border-radius:10px;background:var(--accent-light);color:var(--accent);font-weight:600}
.pj-specs{display:flex;flex-wrap:wrap;gap:6px}
.pj-spec-tag{font-size:10px;padding:3px 10px;border-radius:8px;background:var(--bg);color:var(--text2);text-decoration:none}
.pj-spec-tag:hover{background:var(--accent-light);color:var(--accent)}
.da-empty{text-align:center;padding:30px;color:var(--text3);font-size:13px}
[data-theme="dark"] .scene-card,[data-theme="dark"] .pj-card,[data-theme="dark"] .pj-form{background:#1e1e35}
@media(max-width:600px){.scene-grid{grid-template-columns:1fr}.pj-form{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="header-top">
<a href="../" class="header-logo" style="text-decoration:none;">🧭</a><div><h1>设计助手</h1><p class="subtitle">场景导航 · 项目工作台 — 快速定位所需规范</p></div>
</div></div></header>
<main class="main da-wrap">
<div id="breadcrumb"></div>
<div class="da-tabs">
<button class="da-tab active" data-panel="scenes">📋 场景导航</button>
<button class="da-tab" data-panel="projects">🏗 项目工作台</button>
</div>

<div class="da-panel active" id="panel-scenes">
<div class="scene-grid" id="sceneGrid"></div>
</div>

<div class="da-panel" id="panel-projects">
<div class="pj-form"><h3>📋 新建项目</h3>
<div class="pj-field"><label>项目名称</label><input id="pjName" placeholder="如：XX公路改建工程"></div>
<div class="pj-field"><label>公路等级</label><select id="pjGrade"><option value="highway">高速公路</option><option value="first">一级公路</option><option value="second" selected>二级公路</option><option value="third">三级公路</option><option value="fourth">四级公路</option></select></div>
<div class="pj-field"><label>设计速度 (km/h)</label><select id="pjSpeed"><option value="120">120</option><option value="100">100</option><option value="80" selected>80</option><option value="60">60</option><option value="40">40</option><option value="30">30</option><option value="20">20</option></select></div>
<div class="pj-field"><label>地形类别</label><select id="pjTerrain"><option value="plain">平原微丘</option><option value="hill">山岭重丘</option></select></div>
<button class="pj-btn" onclick="addProject()">➕ 创建项目</button></div>
<div id="pjList"></div>
</div>
</main>

<script src="../js/data.js?v=2"></script>
<script src="../js/router.js?v=2"></script>
<script src="../js/components.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script>
document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([{label:'🏠 首页',link:'../'},{label:'🧭 设计助手'}]);

// 标签切换
document.querySelector('.da-tabs').addEventListener('click',function(e){var t=e.target.closest('.da-tab');if(!t)return;document.querySelectorAll('.da-tab').forEach(function(x){x.classList.remove('active')});t.classList.add('active');document.querySelectorAll('.da-panel').forEach(function(x){x.classList.remove('active')});document.getElementById('panel-'+t.dataset.panel).classList.add('active');});

// ===== 场景导航 =====
var SCENES=[{icon:'📐',name:'路线设计',tip:'先定技术等级(B01)→设计速度→平纵面(D20)→横断面→视距。注意平包竖不超标。',specs:[{code:'JTG B01-2014',title:'公路工程技术标准',key:true,note:'确定技术等级和基本参数'},{code:'JTG D20-2017',title:'公路路线设计规范',key:true,note:'路线设计的核心规范'},{code:'CJJ 193-2012',title:'城市道路路线设计规范'},{code:'JTG/T D21-2014',title:'公路立体交叉设计细则'},{code:'JTG/T 3381-2021',title:'公路限速标志设计规范'}]},{icon:'🪨',name:'路基设计',tip:'定路基宽度→填料选择→压实度(D30)→边坡→排水→特殊处理。高填深挖验稳定。',specs:[{code:'JTG B01-2014',title:'公路工程技术标准',key:true},{code:'JTG D30-2015',title:'公路路基设计规范',key:true,note:'路基设计的核心规范'},{code:'JTG/T D31-2008',title:'软土地基路堤设计'},{code:'JTG/T D32-2012',title:'土工合成材料应用'},{code:'JTG/T D33-2012',title:'公路排水设计规范'}]},{icon:'🛣',name:'路面设计',tip:'交通量→累计轴次→选类型(D50/D40)→结构组合→验算弯沉→定厚度。',specs:[{code:'JTG D50-2017',title:'公路沥青路面设计规范',key:true,note:'沥青路面核心'},{code:'JTG D40-2011',title:'公路水泥混凝土路面设计规范',key:true},{code:'CJJ 169-2012',title:'城镇道路路面设计规范'},{code:'JTG/T F20-2015',title:'路面基层施工技术细则'}]},{icon:'🌉',name:'桥梁设计',tip:'桥位→桥型→荷载(D60)→结构(3362)→基础(D63)→抗震(2231)。小桥涵注意洪水。',specs:[{code:'JTG D60-2015',title:'公路桥涵设计通用规范',key:true,note:'桥梁设计的母规范'},{code:'JTG 3362-2018',title:'RC/PC桥涵设计规范',key:true},{code:'JTG D64-2015',title:'钢结构桥梁设计规范'},{code:'JTG D63-2007',title:'桥涵地基与基础'},{code:'JTG/T 2231-01-2020',title:'桥梁抗震设计规范'},{code:'JTG/T 3365-2022',title:'装配式混凝土桥梁'}]},{icon:'💧',name:'排水设计',tip:'水文调查(C30)→洪水频率→边沟(D33)→涵洞孔径→冲刷计算。',specs:[{code:'JTG/T D33-2012',title:'公路排水设计规范',key:true},{code:'JTG C30-2015',title:'公路工程水文勘测设计规范',key:true},{code:'GB 50201-2014',title:'防洪标准'}]},{icon:'🛡',name:'交安设计',tip:'定护栏等级(D81)→标志布设(D82)→标线(GB5768)→视线诱导。注意护栏端部。',specs:[{code:'JTG D81-2017',title:'交通安全设施设计规范',key:true},{code:'JTG/T D81-2017',title:'交通安全设施设计细则'},{code:'JTG D82-2009',title:'交通标志和标线设置规范',key:true},{code:'GB 5768.2-2022',title:'道路交通标志'},{code:'GB 5768.3-2009',title:'道路交通标线'}]},{icon:'🏘',name:'农村公路',tip:'判断AADT→选等级→简化指标(3311)→经济路面→必设错车道。',specs:[{code:'JTG 2111-2019',title:'小交通量农村公路技术标准',key:true},{code:'JTG/T 3311-2021',title:'农村公路工程设计规范',key:true},{code:'GB/T 51224-2017',title:'乡村道路工程技术规范'},{code:'JTG/T 3351-2024',title:'简易铺装路面设计施工'}]},{icon:'🔧',name:'养护管理',tip:'评定技术状况→分类决策→编制计划→施工→验收。',specs:[{code:'JTG 5110-2023',title:'公路养护技术标准',key:true},{code:'JTG 5142-2019',title:'沥青路面养护技术规范'},{code:'JTG 5120-2021',title:'桥涵养护技术规范'}]}];
var schtml='';
SCENES.forEach(function(scene){schtml+='<div class="scene-card"><h3>'+scene.icon+' '+scene.name+'</h3><div class="scene-tip">'+scene.tip+'</div><div class="scene-links">';scene.specs.forEach(function(s){schtml+='<a href="../specs/?code='+encodeURIComponent(s.code)+'" class="scene-link'+(s.key?' key':'')+'" title="'+(s.note||'')+'">'+(s.key?'⭐ ':'')+s.code+'</a>';});schtml+='</div></div>';});
document.getElementById('sceneGrid').innerHTML=schtml;

// ===== 项目工作台 =====
var gradeSpecs={highway:['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D60-2015','JTG D81-2017','JTG 3370.1-2018','JTG D64-2015'],first:['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D60-2015','JTG D81-2017'],second:['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D81-2017'],third:['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG/T 3311-2021'],fourth:['JTG 2111-2019','JTG/T 3311-2021','JTG/T 3351-2024']};
var gradeNames={highway:'高速公路',first:'一级公路',second:'二级公路',third:'三级公路',fourth:'四级公路'};
var terrainNames={plain:'平原微丘',hill:'山岭重丘'};
var PJ_KEY='saved_projects';
function getProjects(){try{return JSON.parse(localStorage.getItem(PJ_KEY)||'[]')}catch(e){return[]}}
function saveProjects(list){try{localStorage.setItem(PJ_KEY,JSON.stringify(list))}catch(e){}}
function addProject(){var name=document.getElementById('pjName').value.trim();if(!name){alert('请输入项目名称');return}var pj={name:name,grade:document.getElementById('pjGrade').value,speed:document.getElementById('pjSpeed').value,terrain:document.getElementById('pjTerrain').value,created:Date.now()};var list=getProjects();list.unshift(pj);if(list.length>20)list=list.slice(0,20);saveProjects(list);document.getElementById('pjName').value='';renderProjects()}
function delProject(idx){var list=getProjects();list.splice(idx,1);saveProjects(list);renderProjects()}
function renderProjects(){var list=getProjects();var h='';if(list.length===0){h='<div class="da-empty">🏗 暂无项目，创建后自动推荐适用规范</div>'}list.forEach(function(pj,i){var codes=gradeSpecs[pj.grade]||[];var tags='';codes.forEach(function(c){var s=SPECS.find(function(x){return x.code===c});if(s)tags+='<a href="../specs/?code='+encodeURIComponent(c)+'" class="pj-spec-tag" target="_blank">'+c+'</a>'});h+='<div class="pj-card"><div class="pj-header"><div><span class="pj-name">'+pj.name+'</span> <span class="pj-grade">'+gradeNames[pj.grade]+' · '+pj.speed+'km/h · '+terrainNames[pj.terrain]+'</span></div><button class="pj-btn del" onclick="delProject('+i+')">🗑</button></div><div class="pj-specs">'+tags+'</div><div style="margin-top:6px;font-size:10px;color:var(--text3)">📅 '+new Date(pj.created).toLocaleDateString()+' | 🔗 <a href="../quickref/">参数速查</a> | <a href="../calc/">计算器</a> | <a href="../checklist/">检查清单</a></div></div>'});document.getElementById('pjList').innerHTML=h}
renderProjects();

var bt=document.createElement('button');bt.className='back-top';bt.id='backTop';bt.textContent='↑';document.body.appendChild(bt);
window.addEventListener('scroll',function(){bt.classList.toggle('visible',window.scrollY>700)});
bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});
var ft=document.createElement('footer');ft.className='footer';ft.innerHTML=renderFooter();document.querySelector('.main').after(ft);
</script>
</body>
</html>
