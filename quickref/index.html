<style>
.qr-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.qr-tab { padding: 10px 20px; border-radius: 20px; border: 2px solid var(--border); background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.qr-tab:hover { border-color: var(--accent); color: var(--accent); }
.qr-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.qr-section { margin-bottom: 24px; }
.qr-section h3 { font-size: 16px; margin-bottom: 10px; color: var(--text); padding-bottom: 6px; border-bottom: 2px solid var(--accent); }
.qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.qr-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); padding: 14px 18px; transition: all .2s; }
.qr-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.qr-card .qr-name { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.qr-card .qr-value { font-size: 22px; font-weight: 800; color: var(--accent); }
.qr-card .qr-unit { font-size: 12px; color: var(--text3); font-weight: 400; }
.qr-card .qr-source { font-size: 10px; color: var(--text3); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.qr-card .qr-source a { color: var(--accent); }
[data-theme="dark"] .qr-card { background: #1e1e35; }
@media (max-width: 600px) { .qr-grid { grid-template-columns: 1fr; } }
</style>

// 渲染
var tabs=document.getElementById('qrTabs');
var content=document.getElementById('qrContent');
tabs.addEventListener('click',function(e){
  var t=e.target.closest('.qr-tab');if(!t)return;
  tabs.querySelectorAll('.qr-tab').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active');render(t.dataset.grade);
});

function render(grade){
  var groups=PARAMS[grade]||{};
  var h='';
  Object.keys(groups).forEach(function(section){
    h+='<div class="qr-section"><h3>'+section+'</h3><div class="qr-grid">';
    groups[section].forEach(function(p){
      h+='<div class="qr-card"><div class="qr-name">'+p.n+'</div><div class="qr-value">'+p.v+' <span class="qr-unit">'+p.u+'</span></div><div class="qr-source">📚 <a href="../specs/?code='+encodeURIComponent(p.s)+'">'+p.s+'</a></div></div>';
    });
    h+='</div></div>';
  });
  content.innerHTML=h;
}
render('高速');
