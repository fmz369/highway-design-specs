<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公路道路设计规范 · 深度查阅手册</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
<div class="header-inner">
<div class="header-top">
<a href="./" class="header-logo" style="text-decoration:none;">🛣️</a>
<div>
<h1>公路设计规范在线查阅</h1>
<p class="subtitle">收录 89 部规范 | 10 大分类 | 现行率 98% | 核心参数速查 | 支持收藏对比打印</p>
</div>
</div>
<div class="header-actions">
<div class="search-wrapper">
<div class="search-bar">
<input type="text" id="searchInput" placeholder="搜索规范编号 / 名称 / 关键词…（按 / 键快速聚焦）" autocomplete="off">
<button class="clear-btn" id="clearSearch" title="清除">✕</button>
</div>
<div class="search-suggestions" id="searchSuggestions"></div>
</div>
<div class="stats-pills" id="statsPills"></div>
</div>
</div>
</header>

<main class="main">

<!-- 数据看板 -->
<div class="dashboard" id="dashboard"><div class="pie-wrap" style="justify-content:center;padding:30px;color:var(--text3);">📊 加载中...</div></div>

<!-- 分类导航 -->
<h2 style="text-align:center;margin-bottom:6px;font-size:20px;">📂 按分类浏览</h2>
<p style="text-align:center;color:var(--text3);margin-bottom:18px;font-size:13px;">点击分类卡片进入规范列表，或使用顶部搜索框全站检索</p>
<div class="category-cards" id="categoryCards"></div>

<!-- 推荐规范 -->
<h2 style="margin-bottom:14px;font-size:18px;">📌 核心规范推荐</h2>
<div class="grid" id="featuredGrid"></div>

<!-- 最近浏览 -->
<div id="historySection" style="display:none;">
<h2 style="margin-bottom:14px;font-size:18px;">📜 最近浏览</h2>
<div class="grid" id="historyGrid"></div>
</div>

</main>

<footer class="footer">
<div class="footer-links">
<a href="favorites/">⭐ 收藏夹</a>
<a href="compare/">📊 规范对比</a>
<a href="category/?cat=all">📋 全部规范</a>
</div>
<p>⚠ 本网站为设计辅助查阅工具，规范正文请通过交通运输部官网、中国标准在线服务网等官方渠道获取。</p>
<p>数据以各规范正式出版物为准，设计中请使用最新版本。</p>
</footer>

<button class="back-top" id="backTop" title="回到顶部">↑</button>

<script src="js/data.js?v=2"></script>
<script src="js/router.js?v=2"></script>
<script src="js/favorites.js?v=2"></script>
<script src="js/components.js?v=2"></script>
<script src="js/theme.js?v=2"></script>
<script>
// ===== 数据看板 =====
(function() {
  try {
  var counts = getCategoryCounts();
  var total = SPECS.length;
  var current = SPECS.filter(function(s) { return s.status === 'current'; }).length;
  var replaced = total - current;
  var favs = getFavoriteCount();
  var curentPct = Math.round(current / total * 100);

  var dashHTML = '';
  // 统计卡片
  dashHTML += '<div class="stat-cards">';
  dashHTML += '<div class="stat-card"><div class="sc-icon blue">📋</div><div><div class="sc-value">' + total + '</div><div class="sc-label">收录规范总数</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon green">✅</div><div><div class="sc-value">' + current + '</div><div class="sc-label">现行规范（' + curentPct + '%）</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon amber">⭐</div><div><div class="sc-value">' + favs + '</div><div class="sc-label">已收藏规范</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon purple">📂</div><div><div class="sc-value">10</div><div class="sc-label">分类维度</div></div></div>';
  dashHTML += '</div>';

  // 精美圆环图
  var catColors = { bridge:'#e85d9a', safety:'#f05252', pavement:'#31c48d', general:'#9061f9', materials:'#6875f5', rural:'#84cc16', geometry:'#f5a623', drawings:'#0d9488', drainage:'#38bdf8', seismic:'#f97316' };
  var catNames = CAT_NAMES;
  var catOrder = ['bridge','safety','pavement','general','materials','rural','geometry','drawings','drainage','seismic'];
  var totalAll = SPECS.length;
  var R = 50, cx = 76, cy = 76, sw = 24;
  var circ = 2 * Math.PI * R;

  var svgParts = '<defs><filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter></defs>'
    + '<circle cx="76" cy="76" r="' + R + '" fill="none" stroke="#e8e8f0" stroke-width="' + sw + '"/>'
    + '<g transform="rotate(-90 76 76)">';

  var cumLen = 0;
  catOrder.forEach(function(c) {
    var n = counts[c] || 0;
    if (n === 0) return;
    var len = Math.round(n / totalAll * circ);
    if (len < 2) len = 2;
    svgParts += '<a href="category/?cat=' + c + '"><circle cx="76" cy="76" r="' + R + '" fill="none" stroke="' + catColors[c] + '" stroke-width="' + sw + '" stroke-dasharray="' + len + ' ' + (circ - len) + '" stroke-dashoffset="' + (-cumLen) + '" stroke-linecap="round" style="cursor:pointer" onmouseover="this.style.strokeWidth='28'" onmouseout="this.style.strokeWidth='24'"><title>' + catNames[c] + ': ' + n + '部</title></circle></a>';
    cumLen += len;
  });
  svgParts += '</g>';

  // 紧凑可点击图例
  var legendHTML = '';
  catOrder.forEach(function(c) {
    var n = counts[c] || 0;
    if (n === 0) return;
    legendHTML += '<a href="category/?cat=' + c + '" class="pl-item"><span class="pl-dot" style="background:' + catColors[c] + ';"></span><span class="pl-name">' + catNames[c] + '</span><span class="pl-num">' + n + '</span></a>';
  });

  dashHTML += '<div class="pie-wrap"><div class="donut-box"><svg viewBox="0 0 152 152" class="donut-svg">' + svgParts + '</svg><div class="donut-center"><span class="donut-num">' + totalAll + '</span><span class="donut-label">部规范</span></div></div><div class="pie-legend">' + legendHTML + '</div></div>';;
</script>
</body>
</html>
