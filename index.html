<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公路道路设计规范 · 深度查阅手册</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
<div class="header-inner">
<div class="header-top">
<a href="./" class="header-logo" style="text-decoration:none;">🛣️</a>
<div>
<h1>公路道路设计规范 · 深度查阅手册</h1>
<p class="subtitle">Highway & Road Design Standards — 69 部规范 | 章节结构 | 核心参数 | 设计公式 | 离线可查</p>
</div>
</div>
<div class="header-actions">
<div class="search-wrapper">
<div class="search-bar">
<input type="text" id="searchInput" placeholder="搜索规范编号 / 名称 / 关键词…（按 / 键快速聚焦）" autocomplete="off">
<button class="clear-btn" id="clearSearch" title="清除">✕</button>
</div>
<div class="search-suggestions" id="searchSuggestions"></div>
</div>
<div class="stats-pills" id="statsPills"></div>
</div>
</div>
</header>

<main class="main">

<!-- 数据看板 -->
<div class="dashboard" id="dashboard"><div class="pie-wrap" style="justify-content:center;padding:30px;color:var(--text3);">📊 加载中...</div></div>

<!-- 分类导航 -->
<h2 style="text-align:center;margin-bottom:6px;font-size:20px;">📂 按分类浏览</h2>
<p style="text-align:center;color:var(--text3);margin-bottom:18px;font-size:13px;">点击分类卡片进入规范列表，或使用顶部搜索框全站检索</p>
<div class="category-cards" id="categoryCards"></div>

<!-- 推荐规范 -->
<h2 style="margin-bottom:14px;font-size:18px;">📌 核心规范推荐</h2>
<div class="grid" id="featuredGrid"></div>

<!-- 最近浏览 -->
<div id="historySection" style="display:none;">
<h2 style="margin-bottom:14px;font-size:18px;">📜 最近浏览</h2>
<div class="grid" id="historyGrid"></div>
</div>

</main>

<footer class="footer">
<div class="footer-links">
<a href="favorites/">⭐ 收藏夹</a>
<a href="compare/">📊 规范对比</a>
<a href="category/?cat=all">📋 全部规范</a>
</div>
<p>⚠ 本网站为设计辅助查阅工具，规范正文请通过交通运输部官网、中国标准在线服务网等官方渠道获取。</p>
<p>数据以各规范正式出版物为准，设计中请使用最新版本。</p>
</footer>

<button class="back-top" id="backTop" title="回到顶部">↑</button>

<script src="js/data.js?v=2"></script>
<script src="js/router.js?v=2"></script>
<script src="js/favorites.js?v=2"></script>
<script src="js/components.js?v=2"></script>
<script src="js/theme.js?v=2"></script>
<script>
// ===== 数据看板 =====
(function() {
  try {
  var counts = getCategoryCounts();
  var total = SPECS.length;
  var current = SPECS.filter(function(s) { return s.status === 'current'; }).length;
  var replaced = total - current;
  var pdfs = SPECS.filter(function(s) { return s.hasPdf; }).length;
  var curentPct = Math.round(current / total * 100);

  var dashHTML = '';
  // 统计卡片
  dashHTML += '<div class="stat-cards">';
  dashHTML += '<div class="stat-card"><div class="sc-icon blue">📋</div><div><div class="sc-value">' + total + '</div><div class="sc-label">收录规范总数</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon green">✅</div><div><div class="sc-value">' + current + '</div><div class="sc-label">现行规范（' + curentPct + '%）</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon amber">📥</div><div><div class="sc-value">' + pdfs + '</div><div class="sc-label">PDF原文可看</div></div></div>';
  dashHTML += '<div class="stat-card"><div class="sc-icon purple">📂</div><div><div class="sc-value">10</div><div class="sc-label">分类维度</div></div></div>';
  dashHTML += '</div>';

  // SVG饼图（兼容所有浏览器）
  var catColors = { general:'#7c3aed', geometry:'#d97706', pavement:'#16a34a', bridge:'#db2777', drainage:'#0284c7', safety:'#dc2626', rural:'#65a30d', materials:'#4f46e5', seismic:'#ea580c', drawings:'#0d9488' };
  var catNames = CAT_NAMES;
  var catOrder = ['bridge','safety','pavement','general','materials','rural','geometry','drawings','drainage','seismic'];
  var totalAll = SPECS.length;
  var R = 68, cx = 72, cy = 72;

  // 构建SVG扇形路径
  var svgParts = '';
  var cumDeg = -90; // 从顶部开始
  catOrder.forEach(function(c) {
    var n = counts[c] || 0;
    if (n === 0) return;
    var deg = n / totalAll * 360;
    var startRad = cumDeg * Math.PI / 180;
    var endRad = (cumDeg + deg) * Math.PI / 180;
    var x1 = cx + R * Math.cos(startRad);
    var y1 = cy + R * Math.sin(startRad);
    var x2 = cx + R * Math.cos(endRad);
    var y2 = cy + R * Math.sin(endRad);
    var large = deg > 180 ? 1 : 0;
    svgParts += '<path d="M' + cx + ',' + cy + ' L' + x1.toFixed(1) + ',' + y1.toFixed(1) + ' A' + R + ',' + R + ' 0 ' + large + ' 1 ' + x2.toFixed(1) + ',' + y2.toFixed(1) + ' Z" fill="' + catColors[c] + '" stroke="#fff" stroke-width="1.5"/>';
    cumDeg += deg;
  });

  // 构建图例
  var legendHTML = '';
  catOrder.forEach(function(c) {
    var n = counts[c] || 0;
    if (n === 0) return;
    legendHTML += '<span class="pie-legend-item"><i style="background:' + catColors[c] + ';"></i> ' + catNames[c] + ' <b>' + n + '</b></span>';
  });

  dashHTML += '<div class="pie-wrap"><svg viewBox="0 0 144 144" class="pie-chart"><circle cx="72" cy="72" r="68" fill="#f5f5f8"/><circle cx="72" cy="72" r="30" fill="#fff"/>' + svgParts + '</svg><div class="pie-legend">' + legendHTML + '</div></div>';

  document.getElementById('dashboard').innerHTML = dashHTML;
  } catch(e) {
    document.getElementById('dashboard').innerHTML = '<div class="pie-wrap" style="justify-content:center;padding:30px;color:#ef4444;">⚠️ 看板加载失败：' + e.message + '</div>';
  }
})();

// ===== 渲染分类卡片 =====
(function() {
  var counts = getCategoryCounts();
  var cats = ['general', 'geometry', 'pavement', 'bridge', 'drainage', 'safety', 'rural', 'materials', 'seismic'];
  var catColors = {
    general: '#7c3aed', geometry: '#d97706', pavement: '#16a34a',
    bridge: '#db2777', drainage: '#0284c7', safety: '#dc2626',
    rural: '#65a30d', materials: '#4f46e5', seismic: '#ea580c',
    drawings: '#0d9488'
  };
  var catEmoji = {
    general: '📐', geometry: '📏', pavement: '🛣',
    bridge: '🌉', drainage: '💧', safety: '🛡',
    rural: '🏘', materials: '🔩', seismic: '🏔',
    drawings: '📐'
  };

  var html = '';
  cats.forEach(function(c) {
    html += '<a href="category/?cat=' + c + '" class="cat-card" style="border-top: 3px solid ' + catColors[c] + ';">'
      + '<div class="cat-icon">' + catEmoji[c] + '</div>'
      + '<div class="cat-name">' + CAT_NAMES[c] + '</div>'
      + '<div class="cat-count">' + counts[c] + ' 部规范</div>'
      + '</a>';
  });
  document.getElementById('categoryCards').innerHTML = html;

  // 统计胶囊
  document.getElementById('statsPills').innerHTML = renderStatsPills();
})();

// ===== 推荐规范列表 =====
(function() {
  var featured = [
    'JTG B01-2014',       // 公路工程技术标准
    'JTG D20-2017',       // 公路路线设计规范
    'JTG D30-2015',       // 公路路基设计规范
    'JTG D50-2017',       // 公路沥青路面设计规范
    'JTG D60-2015',       // 公路桥涵设计通用规范
    'JTG D81-2017',       // 公路交通安全设施设计规范
  ];
  var specs = featured.map(function(code) {
    return SPECS.find(function(s) { return s.code === code; });
  }).filter(Boolean);

  var html = '';
  specs.forEach(function(s) {
    html += renderCard(s, true);
  });
  document.getElementById('featuredGrid').innerHTML = html;
})();

// ===== 浏览记录 =====
(function() {
  var histSpecs = getHistorySpecs();
  if (histSpecs.length > 0) {
    document.getElementById('historySection').style.display = 'block';
    var hhtml = '';
    histSpecs.forEach(function(s) {
      hhtml += renderCard(s, true);
    });
    document.getElementById('historyGrid').innerHTML = hhtml;
  }
})();

// ===== 搜索（带联想） =====
var si = document.getElementById('searchInput');
var clearBtn = document.getElementById('clearSearch');
var sugDiv = document.getElementById('searchSuggestions');
var searchWrapper = si.closest('.search-wrapper');

si.addEventListener('input', function() {
  clearBtn.classList.toggle('visible', si.value.length > 0);
  var q = si.value.trim();
  if (q) {
    var results = searchSpecs(q).slice(0, 6);
    if (results.length > 0) {
      var sugHTML = '';
      results.forEach(function(s) {
        sugHTML += '<div class="sug-item" data-code="' + s.code + '">'
          + '<span class="sug-code">' + s.code + '</span>'
          + '<span class="sug-title">' + s.title + '</span>'
          + '<span class="sug-cat">' + (CAT_NAMES[s.cat]||'') + '</span></div>';
      });
      sugDiv.innerHTML = sugHTML;
      sugDiv.classList.add('active');
    } else { sugDiv.classList.remove('active'); }
  } else { sugDiv.classList.remove('active'); }
});
sugDiv.addEventListener('mousedown', function(e) {
  var item = e.target.closest('.sug-item');
  if (item) window.location.href = 'specs/?code=' + encodeURIComponent(item.dataset.code);
});
document.addEventListener('click', function(e) {
  if (!searchWrapper.contains(e.target)) sugDiv.classList.remove('active');
});
clearBtn.addEventListener('click', function() {
  si.value = ''; clearBtn.classList.remove('visible'); sugDiv.classList.remove('active'); si.focus();
});
si.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && si.value.trim()) {
    window.location.href = 'category/?cat=all&q=' + encodeURIComponent(si.value.trim());
  }
});

// ===== 快捷键 =====
document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement !== si && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault(); si.focus(); si.select();
  }
});

// ===== 回到顶部 =====
var backTop = document.getElementById('backTop');
window.addEventListener('scroll', function() {
  backTop.classList.toggle('visible', window.scrollY > 700);
});
backTop.addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
</script>
</body>
</html>
