<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>设计检查清单 — 公路设计规范</title>
<link rel="stylesheet" href="../css/site.css">
<style>
.cl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.ctab{padding:8px 16px;border-radius:18px;border:1.5px solid var(--border);background:var(--card-bg);font-size:13px;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.ctab:hover{border-color:var(--accent);color:var(--accent)}
.ctab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cl-panel{display:none}
.cl-panel.active{display:block}
.cl-progress{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.cl-bar{flex:1;height:10px;background:#e8e8f0;border-radius:5px;overflow:hidden}
.cl-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:5px;transition:width .3s}
.cl-pct{font-weight:700;font-size:14px;color:#16a34a;min-width:40px}
.cl-section{margin-bottom:16px}
.cl-section h4{font-size:14px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;margin-bottom:4px;border-radius:8px;transition:background .15s;cursor:pointer}
.cl-item:hover{background:var(--accent-light)}
.cl-item input[type=checkbox]{margin-top:3px;width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
.cl-item.checked .cl-text{text-decoration:line-through;color:var(--text3)}
.cl-text{font-size:13px;color:var(--text2);flex:1}
.cl-ref{font-size:10px;color:var(--accent);white-space:nowrap;font-weight:500}
.cl-btn{padding:6px 16px;border:1.5px solid var(--border);border-radius:16px;background:var(--card-bg);font-size:12px;cursor:pointer;color:var(--text2)}
.cl-btn:hover{border-color:#ef4444;color:#ef4444}
[data-theme=dark] .cl-bar{background:#2a2a45}[data-theme=dark] .cl-item:hover{background:#1e1e35}
</style>
</head>
<body>

</div></div></header>
<main class="main" style="max-width:900px">

<button class="ctab" data-panel="subgrade">🪨 路基设计</button>
<button class="ctab" data-panel="pavement">🛣 路面设计</button>

</div>
<div class="cl-progress"><span style="font-size:13px;color:var(--text2)">完成进度</span><div class="cl-bar"><div class="cl-fill" id="progBar" style="width:0%"></div></div><span class="cl-pct" id="progPct">0%</span><button class="cl-btn" onclick="resetCurrent()">🔄 重置当前</button></div>
<div id="panels"></div>
</main>

<script src="../js/data.js?v=2"></script>
<script src="../js/router.js?v=2"></script>

var checked = getChecked();
var activePanel = 'route';

function renderPanel(panelId) {
  var cl = CHECKLISTS[panelId]; if (!cl) return '';
  var total = 0, done = 0;
  var h = '';
  // 按section分组
  var sections = {};
  cl.items.forEach(function(item) {
    if (!sections[item.s]) sections[item.s] = [];
    sections[item.s].push(item);
  });
  Object.keys(sections).forEach(function(sec) {
    h += '<div class="cl-section"><h4>'+sec+'</h4>';
    sections[sec].forEach(function(item, idx) {
      var key = panelId + '_' + total;
      var isChecked = checked[key];
      if (isChecked) done++;
      total++;
      h += '<div class="cl-item'+(isChecked?' checked':'')+'" data-key="'+key+'" onclick="toggleItem(this)"><input type="checkbox" '+(isChecked?'checked':'')+' tabindex="-1"><span class="cl-text">'+item.t+'</span><span class="cl-ref">'+item.r+'</span></div>';
    });
    h += '</div>';
  });
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  return h;
}

function toggleItem(el) {
  var key = el.dataset.key;
  if (checked[key]) { delete checked[key]; el.classList.remove('checked'); el.querySelector('input').checked = false; }
  else { checked[key] = true; el.classList.add('checked'); el.querySelector('input').checked = true; }
  saveChecked(checked);
  renderAll();
}

function resetCurrent() {
  Object.keys(checked).forEach(function(k) { if (k.startsWith(activePanel + '_')) delete checked[k]; });
  saveChecked(checked);
  renderAll();
}

function renderAll() {
  document.getElementById('panels').innerHTML = '<div class="cl-panel active">'+renderPanel(activePanel)+'</div>';
}

document.getElementById('tabs').addEventListener('click', function(e) {
  var t = e.target.closest('.ctab'); if (!t) return;
  document.querySelectorAll('.ctab').forEach(function(x){x.classList.remove('active')});
  t.classList.add('active');
  activePanel = t.dataset.panel;
  renderAll();
});

renderAll();

var bt=document.createElement('button');bt.className='back-top';bt.id='backTop';bt.textContent='↑';document.body.appendChild(bt);
window.addEventListener('scroll',function(){bt.classList.toggle('visible',window.scrollY>700);});
bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var ft=document.createElement('footer');ft.className='footer';ft.innerHTML='<div class=\"footer-links\"><a href=\"../\">🏠 首页</a> | <a href=\"../quickref/\">📋 参数速查</a> | <a href=\"../compare/\">📊 规范对比</a> | <a href=\"../qa/\">🤖 智能问答</a></div><p style=\"font-size:11px;color:var(--text3);\">⚠ 设计以官方规范正本为准</p>';document.querySelector('.main').after(ft);
</script>
