<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计场景导航 — 公路设计规范</title>
<link rel="stylesheet" href="../css/site.css">
<style>
.scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.scene-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); padding: 20px 22px; transition: all var(--transition); }
.scene-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.scene-card h3 { font-size: 16px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.scene-card p { font-size: 12px; color: var(--text3); margin-bottom: 12px; line-height:1.6; }
.scene-links { display: flex; flex-wrap: wrap; gap: 6px; }
.scene-link { font-size: 11px; padding: 5px 12px; background: var(--accent-light); color: var(--accent); border-radius: 14px; text-decoration: none; transition: all .2s; white-space: nowrap; }
.scene-link:hover { background: var(--accent); color: #fff; text-decoration: none; }
.scene-link.key { background: #fef3c7; color: #92400e; font-weight: 600; }
[data-theme="dark"] .scene-card { background: #1e1e35; }
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="header-top">
<a href="../" class="header-logo" style="text-decoration:none;">🧭</a>
<div><h1>设计场景导航</h1><p class="subtitle">按设计任务查找规范 — 新手友好</p></div>
</div></div></header>
<main class="main" style="max-width:1100px;">
<div id="breadcrumb"></div>
<div class="scene-grid" id="sceneGrid"></div>
</main>
<script src="../js/data.js?v=9"></script><script src="../js/router.js?v=9"></script><script src="../js/components.js?v=9"></script><script src="../js/theme.js?v=9"></script>
<script src="../js/data.js?v=9"></script>

<script>
document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([{label:'🏠 首页',link:'../'},{label:'🧭 设计场景导航'}]);

var SCENES = [
  {icon:'📐',name:'路线设计',desc:'平面线形、纵断面、横断面、平纵组合、视距、超高加宽、交叉口设计', specs:[
    {code:'JTG B01-2014',title:'公路工程技术标准',key:true,note:'确定技术等级和基本参数'},
    {code:'JTG D20-2017',title:'公路路线设计规范',key:true,note:'路线设计的核心规范'},
    {code:'CJJ 193-2012',title:'城市道路路线设计规范',note:'城市道路参考'},
    {code:'JTG/T D21-2014',title:'公路立体交叉设计细则'},
    {code:'JTG/T 3381-2021',title:'公路限速标志设计规范'},
  ]},
  {icon:'🪨',name:'路基设计',desc:'一般路基、特殊路基、路基排水、防护支挡、挡土墙、边坡稳定', specs:[
    {code:'JTG B01-2014',title:'公路工程技术标准',key:true,note:'确定路基宽度和压实度标准'},
    {code:'JTG D30-2015',title:'公路路基设计规范',key:true,note:'路基设计的核心规范'},
    {code:'JTG/T D31-2008',title:'公路软土地基路堤设计与施工技术细则'},
    {code:'JTG/T D32-2012',title:'公路土工合成材料应用技术规范'},
    {code:'JTG/T D33-2012',title:'公路排水设计规范'},
    {code:'JTG/T 3331-2018',title:'公路路基施工技术规范'},
  ]},
  {icon:'🛣',name:'路面设计',desc:'沥青路面、水泥混凝土路面、基层底基层、路面结构组合、材料设计', specs:[
    {code:'JTG B01-2014',title:'公路工程技术标准',key:true},
    {code:'JTG D50-2017',title:'公路沥青路面设计规范',key:true,note:'沥青路面核心规范'},
    {code:'JTG D40-2011',title:'公路水泥混凝土路面设计规范',key:true,note:'水泥路面核心规范'},
    {code:'CJJ 169-2012',title:'城镇道路路面设计规范'},
    {code:'JTG/T F20-2015',title:'公路路面基层施工技术细则'},
    {code:'JTG/T F30-2014',title:'公路水泥混凝土路面施工技术细则'},
  ]},
  {icon:'🌉',name:'桥梁设计',desc:'桥涵总体设计、荷载、RC/PC结构、钢结构、基础、抗震、涵洞', specs:[
    {code:'JTG B01-2014',title:'公路工程技术标准',key:true},
    {code:'JTG D60-2015',title:'公路桥涵设计通用规范',key:true,note:'桥梁设计的\"宪法\"'},
    {code:'JTG 3362-2018',title:'公路钢筋混凝土及预应力混凝土桥涵设计规范',key:true},
    {code:'JTG D64-2015',title:'公路钢结构桥梁设计规范'},
    {code:'JTG D65-2015',title:'公路钢混组合桥梁设计与施工规范'},
    {code:'JTG D63-2007',title:'公路桥涵地基与基础设计规范'},
    {code:'JTG/T 2231-01-2020',title:'公路桥梁抗震设计规范'},
    {code:'JTG/T 3365-2022',title:'公路装配式混凝土桥梁设计规范'},
  ]},
  {icon:'💧',name:'排水设计',desc:'路基路面排水、桥涵水文、设计洪水、冲刷计算', specs:[
    {code:'JTG/T D33-2012',title:'公路排水设计规范',key:true},
    {code:'JTG C30-2015',title:'公路工程水文勘测设计规范',key:true},
    {code:'GB 50201-2014',title:'防洪标准'},
    {code:'CJJ 68-2016',title:'城镇排水管渠与泵站运行维护'},
  ]},
  {icon:'🛡',name:'交安设计',desc:'护栏、交通标志、交通标线、视线诱导、防眩设施、隔离设施', specs:[
    {code:'JTG D81-2017',title:'公路交通安全设施设计规范',key:true},
    {code:'JTG/T D81-2017',title:'公路交通安全设施设计细则'},
    {code:'JTG D82-2009',title:'公路交通标志和标线设置规范',key:true},
    {code:'GB 5768.2-2022',title:'道路交通标志'},
    {code:'GB 5768.3-2009',title:'道路交通标线'},
    {code:'GB 5768.4-2017',title:'作业区'},
    {code:'JTG D70/2-2014',title:'公路隧道设计规范 交通工程'},
  ]},
  {icon:'🏘',name:'农村公路设计',desc:'小交通量农村公路、乡村道路、简易铺装路面', specs:[
    {code:'JTG 2111-2019',title:'小交通量农村公路工程技术标准',key:true},
    {code:'JTG/T 3311-2021',title:'小交通量农村公路工程设计规范',key:true},
    {code:'GB/T 51224-2017',title:'乡村道路工程技术规范'},
    {code:'JTG/T 3351-2024',title:'农村公路简易铺装路面设计施工技术细则'},
  ]},
  {icon:'🔧',name:'养护管理',desc:'日常养护、预防性养护、修复养护、桥涵养护、技术状况评定', specs:[
    {code:'JTG 5110-2023',title:'公路养护技术标准',key:true},
    {code:'JTG 5142-2019',title:'公路沥青路面养护技术规范'},
    {code:'JTG 5150-2020',title:'公路路基养护技术规范'},
    {code:'JTG 5120-2021',title:'公路桥涵养护技术规范'},
  ]},
];

var html = '';
SCENES.forEach(function(scene){
  html += '<div class="scene-card"><h3>'+scene.icon+' '+scene.name+'</h3><p></p><div style="font-size:11px;color:#92400e;background:#fef3c7;padding:6px 10px;border-radius:6px;margin-bottom:8px;line-height:1.5;"></div><div class="scene-links">';
  scene.specs.forEach(function(sp){
    html += '<a href="../specs/?code='+encodeURIComponent(sp.code)+'" class="scene-link'+(sp.key?' key':'')+'" title="'+ (sp.note||'') +'">'+sp.code.substring(0,18)+'</a>';
  });
  html += '</div></div>';
});
document.getElementById('sceneGrid').innerHTML = html;

var bt=document.createElement('button');bt.className='back-top';bt.id='backTop';bt.textContent='↑';document.body.appendChild(bt);
window.addEventListener('scroll',function(){bt.classList.toggle('visible',window.scrollY>700);});
bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var ft=document.createElement('footer');ft.className='footer';ft.innerHTML=renderFooter().replace(/<footer class="footer">|<\/footer>/g,'');document.querySelector('.main').after(ft);
</script>
</body>
</html>
