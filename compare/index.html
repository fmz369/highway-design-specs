<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>规范对比 — 公路道路设计规范</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
<div class="header-inner">
<div class="header-top">
<a href="../" class="header-logo" style="text-decoration:none;">📊</a>
<div>
<h1>规范对比工具</h1>
<p class="subtitle">选择2~4部规范并排对比 ｜ 不确定选哪些？先用 <a href="../qa/" style="color:var(--accent);text-decoration:underline">⚡深度检索</a> 发现相关规范</p>
</div>
</div>
<div id="statsPills"></div>
</div>
</header>

<main class="main compare-container">
<div id="breadcrumb"></div>

<!-- 选择区 -->
<div class="compare-selector" style="background:#fff;padding:16px 20px;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border);margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
<div style="flex:1;min-width:200px;position:relative;">
<label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px;">🔍 搜索规范（最多4部）</label>
<input type="text" id="specSearch" placeholder="输入编号或名称…" style="width:100%;padding:10px 16px;border:1.5px solid var(--border);border-radius:22px;font-size:14px;outline:none;" autocomplete="off">
<div id="searchResults" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-md);max-height:240px;overflow-y:auto;display:none;z-index:50;"></div>
</div>
<div style="min-width:140px;">
<label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px;">📂 按分类加载</label>
<select id="catSelect" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:22px;font-size:13px;outline:none;cursor:pointer;">
<option value="">选择分类…</option></select>
</div>
<div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:2px;">
<button id="btnLoadFavs" class="btn" style="font-size:12px;padding:8px 14px;">⭐ 收藏</button>
<button id="btnClear" class="btn" style="font-size:12px;padding:8px 14px;">🗑 清空</button>
<button id="btnExport" class="btn" style="font-size:12px;padding:8px 14px;display:none;">📥 导出</button>
</div>
</div>

<!-- 规范替代关系提示 -->
<div id="replacementNotice" style="display:none;background:#fef3c7;padding:8px 14px;border-radius:8px;margin-bottom:14px;font-size:12px;color:#92400e;"></div>
<!-- 已选规范 -->
<div id="selectedSpecs" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;"></div>

<!-- 对比表格 -->
<div id="compareResult"></div>

</main>

<script src="../js/data.js?v=2"></script>
<script src="../js/router.js?v=2"></script>
<script src="../js/favorites.js?v=2"></script>
<script src="../js/components.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script src="../js/compare.js?v=3"></script>
<script>
(function() {
  // 面包屑
  document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([
    { label: '🏠 首页', link: '../' },
    { label: '📊 规范对比' }
  ]);
  document.getElementById('statsPills').innerHTML = renderStatsPills();

  var selectedCodes = [];
  var selectedGrades = {}; // {code: grade} 每个规范的选中等级
  var catIconMap = { general:'📐', geometry:'📏', pavement:'🛣', bridge:'🌉', drainage:'💧', safety:'🛡', rural:'🏘', materials:'🔩', seismic:'🏔', drawings:'📚' };

  // 从 URL 读取初始选择
  var urlCodes = getParam('codes');
  if (urlCodes) {
    selectedCodes = urlCodes.split(',').filter(Boolean).slice(0, 4);
  }

  // 从收藏夹加载
  var fromFavs = getParam('from');
  if (fromFavs === 'favorites' && selectedCodes.length === 0) {
    selectedCodes = getFavorites().slice(0, 4);
  }

  function getSelectedSpecs() {
    var specs = selectedCodes.map(function(c) { return getSpecByCode(c); }).filter(Boolean);
    // 检查废止规范
    var replaced = specs.filter(function(s) { return s.status === 'replaced' && s.replacedBy; });
    var notice = document.getElementById('replacementNotice');
    if (replaced.length > 0) {
      var msgs = replaced.map(function(s) { return '⛔ <b>' + s.code + '</b> 已废止，请使用 <b>' + s.replacedBy + '</b> 替代'; });
      notice.innerHTML = msgs.join('<br>');
      notice.style.display = 'block';
    } else { notice.style.display = 'none'; }
    return specs;
  }

  function renderSelected() {
    var specs = getSelectedSpecs();
    var html = '';
    specs.forEach(function(s, i) {
      var p = extractByKeywords(s);
      var grades = p['适用公路等级'] ? p['适用公路等级'].split('/') : [];
      var selHTML = '';
      if (grades.length > 1) {
        var curGrade = selectedGrades[s.code] || grades[grades.length - 1];
        selHTML = ' <select onchange="changeGrade(' + i + ',this.value)" style="font-size:11px;border:1px solid var(--border);border-radius:10px;padding:2px 6px;background:#f8f8ff;">';
        grades.forEach(function(g) { selHTML += '<option value="'+g+'"' + (g===curGrade?' selected':'') + '>'+g+'</option>'; });
        selHTML += '</select>';
      }
      html += '<div style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;">'
        + (catIconMap[s.cat]||'📋') + ' <strong>' + s.code + '</strong>'
        + selHTML
        + '<button onclick="removeSpec(' + i + ')" style="border:none;background:none;cursor:pointer;color:#ef4444;font-size:16px;line-height:1;" title="移除">×</button>'
        + '</div>';
    });
    document.getElementById('selectedSpecs').innerHTML = html;
    // 收集等级
    var gradesForCompare = specs.map(function(s) { return selectedGrades[s.code] || null; });
    document.getElementById('compareResult').innerHTML = renderCompareTable(specs, gradesForCompare);
    document.getElementById('btnExport').style.display = specs.length >= 2 ? 'inline-flex' : 'none';

    // 更新URL
    if (selectedCodes.length > 0) {
      var url = '?codes=' + selectedCodes.map(encodeURIComponent).join(',');
      if (fromFavs) url += '&from=favorites';
      window.history.replaceState({}, '', url);
    } else {
      window.history.replaceState({}, '', window.location.pathname);
    }
  }

  // 全局暴露移除函数
  window.removeSpec = function(i) {
    var code = selectedCodes[i];
    delete selectedGrades[code];
    selectedCodes.splice(i, 1);
    renderSelected();
  };
  // 等级切换
  window.changeGrade = function(i, grade) {
    selectedGrades[selectedCodes[i]] = grade;
    renderSelected();
  };

  // 搜索输入
  var searchInput = document.getElementById('specSearch');
  var searchResults = document.getElementById('searchResults');
  var searchTimer;

  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    var q = searchInput.value.trim().toLowerCase();
    if (!q || selectedCodes.length >= 4) { searchResults.style.display = 'none'; return; }

    searchTimer = setTimeout(function() {
      var results = searchSpecs(q).filter(function(s) {
        return selectedCodes.indexOf(s.code) < 0;
      }).slice(0, 8);

      if (results.length === 0) {
        searchResults.innerHTML = '<div style="padding:10px;color:var(--text3);font-size:12px;">无匹配结果</div>';
      } else {
        var html = '';
        results.forEach(function(s) {
          html += '<div style="padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0;" onmousedown="addSpec(\'' + s.code.replace(/'/g,"\\'") + '\')">'
            + (catIconMap[s.cat]||'📋') + ' <strong>' + s.code + '</strong> ' + s.title + '</div>';
        });
        searchResults.innerHTML = html;
      }
      searchResults.style.display = 'block';
    }, 200);
  });

  // 全局暴露添加函数
  window.addSpec = function(code) {
    if (selectedCodes.indexOf(code) < 0 && selectedCodes.length < 4) {
      selectedCodes.push(code);
      renderSelected();
      searchInput.value = '';
      searchResults.style.display = 'none';
    }
  };

  // 点击外部关闭搜索结果
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
      searchResults.style.display = 'none';
    }
  });

  // 清空按钮
  document.getElementById('btnClear').addEventListener('click', function() {
    selectedCodes = [];
    renderSelected();
  });

  // 分类下拉初始化
  var catSelect = document.getElementById('catSelect');
  var allCats = ['general','geometry','pavement','bridge','drainage','safety','rural','materials','seismic','drawings'];
  allCats.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = CAT_NAMES[c] + ' (' + (getCategoryCounts()[c]||0) + '部)';
    catSelect.appendChild(opt);
  });
  catSelect.addEventListener('change', function() {
    if (!this.value) return;
    var catSpecs = getSpecsByCat(this.value).slice(0, 4);
    selectedCodes = catSpecs.map(function(s) { return s.code; });
    this.value = '';
    renderSelected();
  });

  // 收藏按钮
  document.getElementById('btnLoadFavs').addEventListener('click', function() {
    var favs = getFavorites();
    if (favs.length === 0) { alert('收藏夹为空'); return; }
    selectedCodes = favs.slice(0, 4);
    renderSelected();
  });

  // 导出按钮
  document.getElementById('btnExport').addEventListener('click', function() {
    var specs = getSelectedSpecs();
    if (specs.length < 2) return;
    var params = specs.map(function(s) { return extractByKeywords(s); });
    var allKeys = []; params.forEach(function(p) { Object.keys(p).forEach(function(k) { if (allKeys.indexOf(k) < 0) allKeys.push(k); }); });
    var csv = '参数项,' + specs.map(function(s) { return s.code; }).join(',') + '\n';
    allKeys.forEach(function(k) {
      csv += k + ',' + params.map(function(p) { return p[k] || '-'; }).join(',') + '\n';
    });
    var blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = '规范对比_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  });

  // 初始渲染
  renderSelected();

  // 页脚 + 回到顶部
  var bt = document.createElement('button');
  bt.className = 'back-top'; bt.id = 'backTop'; bt.textContent = '↑';
  document.body.appendChild(bt);
  window.addEventListener('scroll', function() {
    bt.classList.toggle('visible', window.scrollY > 700);
  });
  bt.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  var ft = document.createElement('footer');
  ft.className = 'footer';
  ft.innerHTML = renderFooter().replace(/<footer class="footer">|<\/footer>/g, '');
  document.querySelector('.main').after(ft);
})();
</script>
</body>
</html>
