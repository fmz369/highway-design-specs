<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>项目工作台 — 公路设计规范</title>
<link rel="stylesheet" href="../css/site.css">
<style>
.pj-wrap{max-width:900px;margin:0 auto}
.pj-form{background:var(--card-bg);border-radius:16px;padding:20px 24px;margin-bottom:20px;border:1px solid var(--border);display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;align-items:end}
.pj-form h3{grid-column:1/-1;font-size:16px;margin-bottom:4px}
.pj-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.pj-field input,.pj-field select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none;box-sizing:border-box}
.pj-field input:focus,.pj-field select:focus{border-color:var(--accent)}
.pj-btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer}
.pj-btn:hover{background:#1d4ed8}
.pj-btn.del{background:#fff;color:#ef4444;border:2px solid #ef4444}
.pj-list{margin-top:20px}
.pj-card{background:var(--card-bg);border-radius:14px;padding:16px 20px;margin-bottom:12px;border:1px solid var(--border);transition:all .2s}
.pj-card:hover{box-shadow:var(--shadow-md)}
.pj-card .pj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pj-card .pj-name{font-size:16px;font-weight:700}
.pj-card .pj-grade{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--accent-light);color:var(--accent);font-weight:600}
.pj-specs{display:flex;flex-wrap:wrap;gap:6px}
.pj-spec-tag{font-size:11px;padding:3px 10px;border-radius:8px;background:var(--bg);color:var(--text2);text-decoration:none}
.pj-spec-tag:hover{background:var(--accent-light);color:var(--accent)}
.pj-empty{text-align:center;padding:40px;color:var(--text3)}
[data-theme="dark"] .pj-card{background:#1e1e35}[data-theme="dark"] .pj-btn.del{background:#1e1e35}
@media(max-width:600px){.pj-form{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="header-top">
<a href="../" class="header-logo" style="text-decoration:none;">🏗</a><div><h1>项目工作台</h1><p class="subtitle">创建项目 → 自动匹配适用规范和关键参数</p></div>
</div></div></header>
<main class="main pj-wrap">
<div id="breadcrumb"></div>
<div class="pj-form" id="pjForm">
<h3>📋 新建项目</h3>
<div class="pj-field"><label>项目名称</label><input id="pjName" placeholder="例如：XX公路改建工程"></div>
<div class="pj-field"><label>公路等级</label><select id="pjGrade"><option value="highway">高速公路</option><option value="first">一级公路</option><option value="second" selected>二级公路</option><option value="third">三级公路</option><option value="fourth">四级公路</option></select></div>
<div class="pj-field"><label>设计速度 (km/h)</label><select id="pjSpeed"><option value="120">120</option><option value="100">100</option><option value="80" selected>80</option><option value="60">60</option><option value="40">40</option><option value="30">30</option><option value="20">20</option></select></div>
<div class="pj-field"><label>地形类别</label><select id="pjTerrain"><option value="plain">平原微丘</option><option value="hill">山岭重丘</option></select></div>
<button class="pj-btn" onclick="addProject()">➕ 创建项目</button>
</div>
<div class="pj-list" id="pjList"></div>
</main>

<script src="../js/data.js?v=2"></script>
<script src="../js/router.js?v=2"></script>
<script src="../js/components.js?v=2"></script>
<script src="../js/theme.js?v=2"></script>
<script>
document.getElementById('breadcrumb').innerHTML = renderBreadcrumb([{label:'🏠 首页',link:'../'},{label:'🏗 项目工作台'}]);

var PJ_KEY = 'saved_projects';
function getProjects(){try{return JSON.parse(localStorage.getItem(PJ_KEY)||'[]')}catch(e){return[]}}
function saveProjects(list){try{localStorage.setItem(PJ_KEY,JSON.stringify(list))}catch(e){}}

// 按等级推荐规范
var gradeSpecs = {
  highway: ['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D60-2015','JTG D81-2017','JTG 3370.1-2018','JTG D64-2015'],
  first:   ['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D60-2015','JTG D81-2017'],
  second:  ['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG D50-2017','JTG D81-2017'],
  third:   ['JTG B01-2014','JTG D20-2017','JTG D30-2015','JTG/T 3311-2021'],
  fourth:  ['JTG 2111-2019','JTG/T 3311-2021','JTG/T 3351-2024']
};
var gradeNames = {highway:'高速公路',first:'一级公路',second:'二级公路',third:'三级公路',fourth:'四级公路'};
var terrainNames = {plain:'平原微丘',hill:'山岭重丘'};

function addProject(){
  var name = document.getElementById('pjName').value.trim();
  if(!name){alert('请输入项目名称');return;}
  var pj = {
    name: name, grade: document.getElementById('pjGrade').value,
    speed: document.getElementById('pjSpeed').value,
    terrain: document.getElementById('pjTerrain').value,
    created: Date.now()
  };
  var list = getProjects(); list.unshift(pj);
  if(list.length > 20) list = list.slice(0,20);
  saveProjects(list);
  document.getElementById('pjName').value = '';
  renderProjects();
}

function delProject(idx){
  var list = getProjects(); list.splice(idx,1); saveProjects(list); renderProjects();
}

function renderProjects(){
  var list = getProjects();
  var html = '';
  if(list.length === 0){
    html = '<div class="pj-empty">🏗 暂无项目<br><span style="font-size:12px">创建项目后，系统会自动推荐适用的规范</span></div>';
  }
  list.forEach(function(pj,i){
    var codes = gradeSpecs[pj.grade] || [];
    var tags = '';
    codes.forEach(function(c){
      var spec = SPECS.find(function(s){return s.code===c});
      if(spec) tags += '<a href="../specs/?code='+encodeURIComponent(c)+'" class="pj-spec-tag" target="_blank">'+c+'</a>';
    });
    html += '<div class="pj-card"><div class="pj-header"><div><span class="pj-name">'+pj.name+'</span> <span class="pj-grade">'+gradeNames[pj.grade]+' · '+pj.speed+'km/h · '+terrainNames[pj.terrain]+'</span></div><button class="pj-btn del" onclick="delProject('+i+')">🗑</button></div><div class="pj-specs">'+tags+'</div><div style="margin-top:8px;font-size:11px;color:var(--text3)">📅 创建于 '+new Date(pj.created).toLocaleDateString()+' | 🔗 <a href="../quickref/" style="color:var(--accent)">参数速查</a> | <a href="../calc/" style="color:var(--accent)">计算器</a> | <a href="../checklist/" style="color:var(--accent)">检查清单</a></div></div>';
  });
  document.getElementById('pjList').innerHTML = html;
}

renderProjects();

var bt=document.createElement('button');bt.className='back-top';bt.id='backTop';bt.textContent='↑';document.body.appendChild(bt);
window.addEventListener('scroll',function(){bt.classList.toggle('visible',window.scrollY>700)});
bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'})});
var ft=document.createElement('footer');ft.className='footer';ft.innerHTML=renderFooter();document.querySelector('.main').after(ft);
</script>
</body>
</html>
